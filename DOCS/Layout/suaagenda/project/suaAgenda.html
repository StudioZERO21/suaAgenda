<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>suaAgenda.pro — Template SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Nunito:wght@400;500;600;700&family=Lato:wght@400;700&family=Montserrat:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Font variables ─────────────────────────────────── */
    :root {
      --sa-font-body:    'Inter', -apple-system, sans-serif;
      --sa-font-heading: 'Poppins', sans-serif;
    }

    body {
      font-family: var(--sa-font-body);
      background: var(--sa-bg, #f5f5f5);
      color: var(--sa-text1, #1a1a1a);
    }

    h1, h2, h3, h4 { font-family: var(--sa-font-heading); }

    input, textarea, select, button {
      font-family: var(--sa-font-body);
    }

    /* ── CSS Vars — Palette A Light (defaults) ─────────── */
    :root {
      --sa-primary:      #1a1a1a;
      --sa-primary-l:    #2d2d2d;
      --sa-secondary:    #d4a574;
      --sa-secondary-l:  #e6c299;
      --sa-bg:           #f5f5f5;
      --sa-surface:      #ffffff;
      --sa-surface2:     #fafafa;
      --sa-text1:        #1a1a1a;
      --sa-text2:        #5a5a5a;
      --sa-text3:        #999999;
      --sa-border:       #e2e2e2;
      --sa-border2:      #d0d0d0;
      --sa-side-bg:      #111111;
      --sa-side-text:    #eeeeee;
      --sa-side-muted:   #888888;
      --sa-side-accent:  #d4a574;
    }

    /* ── Scrollbars ─────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sa-border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--sa-text3); }

    /* ── Skeleton shimmer ───────────────────────────────── */
    @keyframes sa-skeleton {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes sa-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes sa-modal-in {
      from { opacity: 0; transform: scale(.96) translateY(-12px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }
    @keyframes sa-slide-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Focus visible ──────────────────────────────────── */
    *:focus-visible {
      outline: 2px solid var(--sa-secondary);
      outline-offset: 2px;
    }

    /* ── Selection ──────────────────────────────────────── */
    ::selection {
      background: var(--sa-secondary);
      color: #fff;
    }

    /* ── Date input ─────────────────────────────────────── */
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: .5;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <!-- Foundation (no JSX) -->
  <script src="utils.js"></script>

  <!-- Tweaks panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- UI primitives -->
  <script type="text/babel" src="ui.jsx"></script>

  <!-- Layout -->
  <script type="text/babel" src="layout.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="CalendarScreen.jsx"></script>
  <script type="text/babel" src="ClientsScreen.jsx"></script>
  <script type="text/babel" src="BookingModal.jsx"></script>
  <script type="text/babel" src="PublicScreen.jsx"></script>
  <script type="text/babel" src="SettingsScreen.jsx"></script>
  <script type="text/babel" src="FinancialScreen.jsx"></script>
  <script type="text/babel" src="ReportsScreen.jsx"></script>
  <script type="text/babel" src="PlansScreen.jsx"></script>

  <!-- New screens -->
  <script type="text/babel" src="StaffScreen.jsx"></script>
  <script type="text/babel" src="PermissionsScreen.jsx"></script>
  <script type="text/babel" src="PortfolioScreen.jsx"></script>
  <script type="text/babel" src="ServicesScreen.jsx"></script>
  <script type="text/babel" src="RolesScreen.jsx"></script>
  <script type="text/babel" src="ProductsScreen.jsx"></script>
  <script type="text/babel" src="POSScreen.jsx"></script>
  <script type="text/babel" src="SiteSettingsScreen.jsx"></script>
  <script type="text/babel" src="RecoverScreen.jsx"></script>

  <!-- Modals: Notifications, Company, Profile -->
  <script type="text/babel" src="Modals.jsx"></script>

  <!-- App entry point -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
